# BLACK-ICE ARCH — monitors.conf
# Configuración multi-monitor dinámica
# Hyprland detecta automáticamente monitores conectados.
# Agrega entradas específicas ANTES del fallback para tus monitores.

# ─── MONITOR PRIMARIO (laptop interno) ──────────────────────────────────────
# Detecta eDP-1 (pantalla laptop) con resolución preferida y escala 1
monitor = eDP-1, preferred, 0x0, 1

# ─── MONITOR EXTERNO — HDMI ──────────────────────────────────────────────────
# Conectado a la derecha del laptop (auto-posición)
monitor = HDMI-A-1, preferred, auto, 1

# ─── MONITOR EXTERNO — DisplayPort ───────────────────────────────────────────
monitor = DP-1, preferred, auto, 1
monitor = DP-2, preferred, auto, 1
monitor = DP-3, preferred, auto, 1

# ─── USB-C / Thunderbolt ─────────────────────────────────────────────────────
monitor = USB-C-1, preferred, auto, 1

# ─── FALLBACK UNIVERSAL ───────────────────────────────────────────────────────
# Cualquier monitor no listado arriba se configura automáticamente.
# preferred = resolución/refresh óptimos detectados
# auto      = posición automática sin solapamiento
# 1         = escala 1:1 (ajustar a 1.5 o 2 para HiDPI)
monitor = , preferred, auto, 1

# ─── WORKSPACE MAPPING ────────────────────────────────────────────────────────
# Asignar workspaces a monitores específicos (descomentar si usas dual monitor):
# workspace = 1, monitor:eDP-1, default:true
# workspace = 2, monitor:eDP-1
# workspace = 3, monitor:HDMI-A-1, default:true
# workspace = 4, monitor:HDMI-A-1
# workspace = 5, monitor:HDMI-A-1
