# BLACK-ICE ARCH — hypridle configuration
# Gestión de inactividad: brillo → bloqueo → apagado pantalla → suspensión

general {
    lock_cmd      = pidof hyprlock || hyprlock   # No lanza múltiples instancias
    before_sleep_cmd = loginctl lock-session       # Bloquear antes de suspender
    after_sleep_cmd  = hyprctl dispatch dpms on    # Encender pantalla al despertar
}

# 1. Reducir brillo a 10% tras 4 minutos sin actividad
listener {
    timeout  = 240
    on-timeout = brightnessctl -s set 10%
    on-resume  = brightnessctl -r
}

# 2. Bloquear sesión tras 8 minutos
listener {
    timeout  = 480
    on-timeout = loginctl lock-session
}

# 3. Apagar pantalla (DPMS off) tras 10 minutos
listener {
    timeout  = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 4. Suspender sistema tras 30 minutos
listener {
    timeout  = 1800
    on-timeout = systemctl suspend
}
