# BLACK-ICE ARCH — hypridle configuration
# Adaptativo: AC/corriente → solo bloqueo | Batería → dim+lock+dpms+suspend | VM → solo bloqueo
# Guards en ac_guard.sh: chequea AC online y systemd-detect-virt antes de actuar

general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# 1. Reducir brillo a 10% tras 4 min (solo batería)
listener {
    timeout  = 240
    on-timeout = ~/.config/hypr/scripts/ac_guard.sh dim-down
    on-resume  = ~/.config/hypr/scripts/ac_guard.sh dim-up
}

# 2. Bloquear sesión tras 8 min (siempre — seguridad básica)
listener {
    timeout  = 480
    on-timeout = loginctl lock-session
}

# 3. Apagar pantalla (DPMS off) tras 10 min (solo batería)
listener {
    timeout  = 600
    on-timeout = ~/.config/hypr/scripts/ac_guard.sh dpms-off
    on-resume  = hyprctl dispatch dpms on
}

# 4. Suspender tras 30 min (solo batería, nunca en VM)
listener {
    timeout  = 1800
    on-timeout = ~/.config/hypr/scripts/ac_guard.sh suspend
}
