# BLACK-ICE ARCH — Hyprlock v0.9+ — HACKER EDITION
# Full cyberpunk lock screen con system telemetry en tiempo real

general {
    hide_cursor = true
    ignore_empty_input = true
}

# ── Fondo: screenshot borroso + overlay oscuro ────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    noise = 0.0117
    contrast = 0.9
    brightness = 0.72
    vibrancy = 0.2
    vibrancy_darkness = 0.0
    color = rgba(0, 8, 15, 0.25)
}

# ══════════════════════════════════════════════════════════════
#  CABECERA — TOP BAR estilo terminal
# ══════════════════════════════════════════════════════════════

label {
    monitor =
    text = cmd[update:1000] echo "[ BLACK-ICE ARCH ] — $(date +'%Y-%m-%d') — $(date +'%H:%M:%S') UTC$(date +%z)"
    color = rgba(0, 243, 255, 0.55)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 540
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2000] printf '%.0s─' {1..90} | tr -d '\n'
    color = rgba(0, 243, 255, 0.2)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, 520
    halign = center
    valign = center
}

# ══════════════════════════════════════════════════════════════
#  COLUMNA IZQUIERDA — System Telemetry
# ══════════════════════════════════════════════════════════════

label {
    monitor =
    text = ▓ SYSTEM_TELEMETRY
    color = rgba(0, 243, 255, 0.7)
    font_size = 11
    font_family = JetBrainsMono Nerd Font Bold
    position = -620, 260
    halign = left
    valign = center
}

label {
    monitor =
    text = cmd[update:3000] printf "  CPU LOAD   : %s\n  RAM USAGE  : %s\n  SWAP USAGE : %s\n  PROCESSES  : %s" \
        "$(grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$3+$4+$5; if(t>0) printf "%d%%", 100*(u-prev_u)/(t-prev_t); prev_u=u; prev_t=t}' 2>/dev/null || top -bn1 | grep 'Cpu(s)' | awk '{printf "%s%%", $2}' 2>/dev/null || echo 'N/A')" \
        "$(free -h | awk '/^Mem:/{printf "%s / %s (%s)", $3, $2, $5}')" \
        "$(free -h | awk '/^Swap:/{if($2=="0B") print "INACTIVE"; else printf "%s / %s", $3, $2}')" \
        "$(ps aux | wc -l)"
    color = rgba(80, 250, 123, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -620, 180
    halign = left
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] printf "  HOSTNAME   : %s\n  KERNEL     : %s\n  ARCH       : %s\n  UPTIME     : %s" \
        "$(hostname)" \
        "$(uname -r | cut -c1-30)" \
        "$(uname -m)" \
        "$(uptime -p | sed 's/up //')"
    color = rgba(189, 147, 249, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -620, 50
    halign = left
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] printf "  DISK ROOT  : %s\n  DISK HOME  : %s\n  LOAD AVG   : %s" \
        "$(df -h / | awk 'NR==2{printf "%s / %s (%s)", $3, $2, $5}')" \
        "$(df -h /home 2>/dev/null | awk 'NR==2{printf "%s / %s (%s)", $3, $2, $5}' || echo 'N/A')" \
        "$(cat /proc/loadavg | awk '{print $1, $2, $3}')"
    color = rgba(255, 184, 108, 0.8)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -620, -80
    halign = left
    valign = center
}

# ══════════════════════════════════════════════════════════════
#  COLUMNA DERECHA — Network + Security Status
# ══════════════════════════════════════════════════════════════

label {
    monitor =
    text = ▓ NETWORK_STATUS
    color = rgba(0, 243, 255, 0.7)
    font_size = 11
    font_family = JetBrainsMono Nerd Font Bold
    position = 620, 260
    halign = right
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] ip -o addr show scope global 2>/dev/null | awk '{split($4,a,"/"); printf "  %-8s : %s\n", $2, a[1]}' | head -4 || echo "  NO INTERFACES ONLINE"
    color = rgba(80, 250, 123, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 620, 170
    halign = right
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] printf "  GATEWAY    : %s\n  DNS        : %s\n  MAC        : %s" \
        "$(ip route show default 2>/dev/null | awk '/default/{print $3; exit}' || echo 'N/A')" \
        "$(grep '^nameserver' /etc/resolv.conf 2>/dev/null | head -1 | awk '{print $2}' || echo 'N/A')" \
        "$(ip link show | awk '/ether/{print $2; exit}' || echo 'N/A')"
    color = rgba(189, 147, 249, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 620, 50
    halign = right
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] printf "  FIREWALL   : %s\n  SUID FILES : %s\n  OPEN PORTS : %s\n  LAST LOGIN : %s" \
        "$(systemctl is-active nftables 2>/dev/null || systemctl is-active iptables 2>/dev/null || echo 'INACTIVE')" \
        "$(find /usr/bin /usr/sbin -perm /4000 2>/dev/null | wc -l) binaries" \
        "$(ss -tlnp 2>/dev/null | grep -c LISTEN || echo 'N/A')" \
        "$(last -n 2 2>/dev/null | awk 'NR==2{print $1, $3, $4, $5}' || echo 'N/A')"
    color = rgba(255, 85, 85, 0.8)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 620, -80
    halign = right
    valign = center
}

