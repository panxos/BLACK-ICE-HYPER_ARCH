# BLACK-ICE ARCH — Hyprlock v0.9+
# Cyberpunk lock screen con feedback claro de escritura

general {
    hide_cursor = true
    ignore_empty_input = true
}

# ── Fondo: screenshot borroso + overlay oscuro ────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.65
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    color = rgba(0, 20, 30, 0.3)
}

# ── Logo / título ─────────────────────────────────────────────────────────────
label {
    monitor =
    text = BLACK-ICE
    color = rgba(0, 243, 255, 0.85)
    font_size = 52
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 310
    halign = center
    valign = center
}

label {
    monitor =
    text = ⚠  SISTEMA BLOQUEADO  ⚠
    color = rgba(255, 85, 85, 0.9)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 255
    halign = center
    valign = center
}

# ── Hora grande ───────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +'%H:%M:%S'
    color = rgba(0, 243, 255, 1.0)
    font_size = 110
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 90
    halign = center
    valign = center
}

# ── Fecha ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date +'%A, %d %B %Y'
    color = rgba(189, 147, 249, 0.9)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -5
    halign = center
    valign = center
}

# ── Ícono usuario ─────────────────────────────────────────────────────────────
label {
    monitor =
    text =
    color = rgba(0, 243, 255, 0.9)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, -90
    halign = center
    valign = center
}

# ── Usuario@host ──────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:3600000] echo "$USER@$(hostname)"
    color = rgba(189, 147, 249, 0.85)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -148
    halign = center
    valign = center
}

# ── Campo de contraseña — input-field (hyprlock 0.5+) ────────────────────────
input-field {
    monitor =
    size = 420, 62
    rounding = 12
    outline_thickness = 4

    # Dots grandes y visibles — el usuario ve feedback inmediato
    dots_size = 0.38
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 243, 255, 0.85)
    inner_color = rgba(10, 14, 20, 0.96)
    font_color = rgba(0, 243, 255, 1.0)

    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text = <span foreground="#6272a4"> contraseña...</span>

    # Verde al verificar, rojo si falla
    check_color = rgba(80, 250, 123, 0.9)
    fail_color = rgba(255, 85, 85, 0.9)
    fail_text = <span foreground="#ff5555">⚠  Contraseña incorrecta</span>
    fail_transition = 300

    # Naranja si CapsLock activo (aviso visual)
    capslock_color = rgba(255, 184, 108, 1.0)
    numlock_color = -1
    bothlock_color = -1

    swap_font_color = false
    hide_input = false

    position = 0, -218
    halign = center
    valign = center
}

# ── Hint CapsLock ─────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] bash -c 'xset q 2>/dev/null | grep -q "Caps Lock: *on" && echo "⚠ CAPS LOCK ACTIVO" || echo ""'
    color = rgba(255, 184, 108, 1.0)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -290
    halign = center
    valign = center
}

# ── Batería (laptop) ──────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:30000] bash -c 'b=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); [ -n "$b" ] && echo "  $b%" || echo ""'
    color = rgba(0, 243, 255, 0.6)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -320
    halign = center
    valign = center
}
