# BLACK-ICE ARCH — Hyprlock HACKER EDITION v2
# Layout: binary streams + system telemetry + DSEG7 clock

general {
    hide_cursor = true
    ignore_empty_input = true
}

# ── Fondo: wallpaper actual borroso ──────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.012
    contrast = 0.85
    brightness = 0.60
    vibrancy = 0.25
    vibrancy_darkness = 0.0
    color = rgb(5, 12, 22)
}

# ══════════════════════════════════════════════════════════════════════════════
#  TOP BAR
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = cmd[update:1000] printf "[ BLACK-ICE-ARCH ]──[ %s ]──[ UPTIME: %s ]──[ %s ]" "$(date +'%Y-%m-%d')" "$(uptime -p | sed 's/up //')" "$(hostname)"
    color = rgba(0, 243, 255, 0.45)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, 530
    halign = center
    valign = center
}
label {
    monitor =
    text = ──────────────────────────────────────────────────────────────────────────────────────────────────
    color = rgba(0, 243, 255, 0.15)
    font_size = 9
    font_family = JetBrainsMono Nerd Font
    position = 0, 510
    halign = center
    valign = center
}

# ══════════════════════════════════════════════════════════════════════════════
#  COLUMNA IZQUIERDA — System Telemetry
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = ░▒▓ SYSTEM_TELEMETRY ▓▒░
    color = rgba(0, 243, 255, 0.65)
    font_size = 10
    font_family = JetBrainsMono Nerd Font Bold
    position = -680, 270
    halign = left
    valign = center
}
label {
    monitor =
    text = cmd[update:2500] printf "CPU  : %s\nRAM  : %s\nSWAP : %s\nPROC : %s procs" \
        "$(top -bn1 | grep 'Cpu(s)' | awk '{printf "%.1f%%", $2+$4}' 2>/dev/null || echo 'N/A')" \
        "$(free -h | awk '/^Mem:/{printf "%s/%s", $3, $2}')" \
        "$(free -h | awk '/^Swap:/{if($2~/^0/) print "off"; else printf "%s/%s",$3,$2}')" \
        "$(ps -e --no-header | wc -l)"
    color = rgba(80, 250, 123, 0.9)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -680, 185
    halign = left
    valign = center
}
label {
    monitor =
    text = cmd[update:8000] printf "HOST : %s\nKRNL : %s\nARCH : %s\nUPTM : %s" \
        "$(hostname)" "$(uname -r | cut -c1-28)" "$(uname -m)" "$(uptime -p | sed 's/up //')"
    color = rgba(189, 147, 249, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -680, 55
    halign = left
    valign = center
}
label {
    monitor =
    text = cmd[update:5000] printf "DISK : %s\nHOME : %s\nLOAD : %s" \
        "$(df -h / | awk 'NR==2{printf "%s/%s(%s)",$3,$2,$5}')" \
        "$(df -h /home 2>/dev/null | awk 'NR==2{printf "%s/%s(%s)",$3,$2,$5}' || echo 'N/A')" \
        "$(cut -d' ' -f1-3 /proc/loadavg)"
    color = rgba(255, 184, 108, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -680, -75
    halign = left
    valign = center
}

# ══════════════════════════════════════════════════════════════════════════════
#  STREAM BINARIO IZQUIERDO — columna de hex aleatorio
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = cmd[update:160] printf "%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x" \
        $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) \
        $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) \
        $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM))
    color = rgba(0, 243, 255, 0.18)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = -330, 120
    halign = left
    valign = center
}
label {
    monitor =
    text = cmd[update:220] printf "%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x" \
        $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) \
        $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) \
        $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM))
    color = rgba(176, 38, 255, 0.14)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = -240, 50
    halign = left
    valign = center
}

# ══════════════════════════════════════════════════════════════════════════════
#  COLUMNA DERECHA — Network + Security
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = ░▒▓ NETWORK_STATUS ▓▒░
    color = rgba(0, 243, 255, 0.65)
    font_size = 10
    font_family = JetBrainsMono Nerd Font Bold
    position = 680, 270
    halign = right
    valign = center
}
label {
    monitor =
    text = cmd[update:5000] ip -o addr show scope global 2>/dev/null | awk '{split($4,a,"/"); printf "%-8s : %s\n", $2, a[1]}' | head -4 || echo "NO INTERFACES ONLINE"
    color = rgba(80, 250, 123, 0.9)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 680, 175
    halign = right
    valign = center
}
label {
    monitor =
    text = cmd[update:30000] printf "GW   : %s\nDNS  : %s\nMAC  : %s" \
        "$(ip route show default 2>/dev/null | awk '/default/{print $3;exit}' || echo 'N/A')" \
        "$(awk '/^nameserver/{print $2;exit}' /etc/resolv.conf 2>/dev/null || echo 'N/A')" \
        "$(ip link show | awk '/ether/{print $2;exit}' || echo 'N/A')"
    color = rgba(189, 147, 249, 0.85)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 680, 60
    halign = right
    valign = center
}
label {
    monitor =
    text = cmd[update:60000] printf "FW   : %s\nSUID : %s bins\nPORTS: %s open\nLOGIN: %s" \
        "$(systemctl is-active nftables 2>/dev/null || echo INACTIVE)" \
        "$(find /usr/bin /usr/sbin -perm /4000 2>/dev/null | wc -l)" \
        "$(ss -tlnp 2>/dev/null | grep -c LISTEN || echo '?')" \
        "$(last -n 2 2>/dev/null | awk 'NR==2{print $1,$3,$4}' || echo 'N/A')"
    color = rgba(255, 85, 85, 0.8)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 680, -75
    halign = right
    valign = center
}

# ══════════════════════════════════════════════════════════════════════════════
#  STREAM BINARIO DERECHO
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = cmd[update:180] printf "%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x\n%04x" \
        $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) \
        $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) \
        $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM)) $((RANDOM))
    color = rgba(0, 243, 255, 0.18)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 330, 120
    halign = right
    valign = center
}
label {
    monitor =
    text = cmd[update:200] printf "%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x\n%08x" \
        $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) \
        $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) \
        $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM)) $((RANDOM*RANDOM))
    color = rgba(176, 38, 255, 0.14)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 240, 50
    halign = right
    valign = center
}

# ══════════════════════════════════════════════════════════════════════════════
#  CENTRO — Logo + Reloj LCD + Auth
# ══════════════════════════════════════════════════════════════════════════════

# Marco superior
label {
    monitor =
    text = ╔══════════════════════════════════╗
    color = rgba(0, 243, 255, 0.35)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 365
    halign = center
    valign = center
}
label {
    monitor =
    text = BLACK-ICE
    color = rgba(0, 243, 255, 0.95)
    font_size = 52
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 305
    halign = center
    valign = center
}
label {
    monitor =
    text = ▀▄  A R C H   L I N U X  ▄▀
    color = rgba(176, 38, 255, 0.65)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 258
    halign = center
    valign = center
}
label {
    monitor =
    text = ╚══════════════════════════════════╝
    color = rgba(0, 243, 255, 0.35)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 210
    halign = center
    valign = center
}

# Reloj LCD — DSEG7 Classic (7 segmentos real)
label {
    monitor =
    text = cmd[update:1000] date +'%H:%M:%S'
    color = rgba(0, 243, 255, 1.0)
    font_size = 86
    font_family = DSEG7 Classic
    position = 0, 115
    halign = center
    valign = center
}

# Fecha
label {
    monitor =
    text = cmd[update:60000] date +'%A  %d %B %Y'
    color = rgba(189, 147, 249, 0.85)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 28
    halign = center
    valign = center
}

# Barra de progreso scanner — cicla 0→100% cada ~3s
label {
    monitor =
    text = cmd[update:150] bash -c 's=$(( ($(date +%s%3N) / 150) % 21 )); filled=$s; empty=$((20-s)); printf "["; printf "█%.0s" $(seq 1 $filled 2>/dev/null); printf "░%.0s" $(seq 1 $empty 2>/dev/null); printf "] %d%%" $((s*5))'
    color = rgba(0, 243, 255, 0.5)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -5
    halign = center
    valign = center
}

# Mensaje rotativo de scan
label {
    monitor =
    text = cmd[update:600] bash -c 'msgs=("SCANNING BIOMETRICS..." "VERIFYING NEURAL SIGNATURE..." "CHECKING ACCESS CLEARANCE..." "CROSS-REFERENCING IDENTITY..." "ANALYZING BEHAVIORAL PATTERN..." "LOADING SECURITY PROFILE..."); echo "${msgs[$(($(date +%s) / 3 % 6))]}"'
    color = rgba(0, 243, 255, 0.35)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -25
    halign = center
    valign = center
}

# Usuario
label {
    monitor =
    text =
    color = rgba(0, 243, 255, 0.85)
    font_size = 46
    font_family = JetBrainsMono Nerd Font
    position = 0, -85
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:3600000] echo "$USER@$(hostname)"
    color = rgba(189, 147, 249, 0.8)
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, -135
    halign = center
    valign = center
}

# Input field — SIN Pango markup
input-field {
    monitor =
    size = 390, 55
    rounding = 3
    outline_thickness = 2

    dots_size = 0.35
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 243, 255, 0.75)
    inner_color = rgba(3, 8, 18, 0.97)
    font_color = rgba(0, 243, 255, 1.0)

    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = CREDENTIAL_HASH_

    check_color = rgba(80, 250, 123, 0.9)
    fail_color = rgba(255, 85, 85, 0.9)
    fail_text = ACCESS DENIED — WRONG CREDENTIAL
    fail_transition = 300

    capslock_color = rgba(255, 184, 108, 1.0)
    numlock_color = -1
    bothlock_color = -1

    swap_font_color = false
    hide_input = false

    position = 0, -198
    halign = center
    valign = center
}

# Hint rotativo bajo el campo
label {
    monitor =
    text = cmd[update:800] bash -c 'h=("> ENTER CREDENTIALS TO PROCEED" "> ALL ACCESS ATTEMPTS ARE LOGGED" "> UNAUTHORIZED ACCESS PROHIBITED" "> SESSION LOCKED BY SECURITY POLICY"); echo "${h[$(($(date +%s) / 4 % 4))]}"'
    color = rgba(0, 243, 255, 0.28)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -248
    halign = center
    valign = center
}

# CapsLock via /sys (Wayland-safe)
label {
    monitor =
    text = cmd[update:1000] bash -c 'cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | grep -q "^1$" && echo "  CAPS LOCK ACTIVE" || echo ""'
    color = rgba(255, 184, 108, 1.0)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -272
    halign = center
    valign = center
}

# Batería
label {
    monitor =
    text = cmd[update:30000] bash -c 'b=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); s=$(cat /sys/class/power_supply/BAT*/status 2>/dev/null | head -1); [ -n "$b" ] && echo " PWR: $b% [$s]" || echo ""'
    color = rgba(0, 243, 255, 0.45)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -295
    halign = center
    valign = center
}

# ══════════════════════════════════════════════════════════════════════════════
#  FOOTER
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = ──────────────────────────────────────────────────────────────────────────────────────────────────
    color = rgba(0, 243, 255, 0.12)
    font_size = 9
    font_family = JetBrainsMono Nerd Font
    position = 0, -500
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo "[ ENCRYPTION: ACTIVE ] [ AUDIT: ENABLED ] [ IP: $(hostname -I 2>/dev/null | awk '{print $1}') ] [ $(date +'%H:%M:%S') ]"
    color = rgba(0, 243, 255, 0.28)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -520
    halign = center
    valign = center
}

# Escape apaga pantalla cuando está bloqueado
bind = ESCAPE, exec, hyprctl dispatch dpms off
