# BLACK-ICE ARCH — Hyprlock SDDM SYNC FINAL
# Sincronización perfecta con Cybersec Theme

general {
    hide_cursor = true
    ignore_empty_input = true
}

# ── Fondo: SDDM Cybersec ─────────────────────────────────────────────────────
background {
    monitor =
    path = /usr/share/sddm/themes/cybersec/assets/background.png
    blur_passes = 1
    blur_size = 3
    contrast = 1.1
    brightness = 0.25
    vibrancy = 0.4
    color = rgb(2, 6, 10)
}

# ══════════════════════════════════════════════════════════════════════════════
#  MATRIX RAIN - DENSIDAD MÁXIMA (Katakana Stream)
# ══════════════════════════════════════════════════════════════════════════════
# IZQUIERDA
label { monitor =; text = cmd[update:80] ~/.config/hypr/scripts/matrix_rain.sh 1 40; color = rgba(0, 243, 255, 0.5); font_size = 13; font_family = JetBrainsMono Nerd Font; position = -900, 0; halign = center; valign = center }
label { monitor =; text = cmd[update:90] ~/.config/hypr/scripts/matrix_rain.sh 2 40; color = rgba(188, 0, 255, 0.4); font_size = 13; font_family = JetBrainsMono Nerd Font; position = -800, 0; halign = center; valign = center }
label { monitor =; text = cmd[update:85] ~/.config/hypr/scripts/matrix_rain.sh 3 40; color = rgba(0, 243, 255, 0.3); font_size = 13; font_family = JetBrainsMono Nerd Font; position = -700, 0; halign = center; valign = center }
label { monitor =; text = cmd[update:95] ~/.config/hypr/scripts/matrix_rain.sh 4 40; color = rgba(0, 243, 255, 0.5); font_size = 13; font_family = JetBrainsMono Nerd Font; position = -600, 0; halign = center; valign = center }

# DERECHA
label { monitor =; text = cmd[update:80] ~/.config/hypr/scripts/matrix_rain.sh 5 40; color = rgba(0, 243, 255, 0.5); font_size = 13; font_family = JetBrainsMono Nerd Font; position = 900, 0; halign = center; valign = center }
label { monitor =; text = cmd[update:90] ~/.config/hypr/scripts/matrix_rain.sh 6 40; color = rgba(188, 0, 255, 0.4); font_size = 13; font_family = JetBrainsMono Nerd Font; position = 800, 0; halign = center; valign = center }
label { monitor =; text = cmd[update:85] ~/.config/hypr/scripts/matrix_rain.sh 7 40; color = rgba(0, 243, 255, 0.3); font_size = 13; font_family = JetBrainsMono Nerd Font; position = 700, 0; halign = center; valign = center }
label { monitor =; text = cmd[update:95] ~/.config/hypr/scripts/matrix_rain.sh 8 40; color = rgba(0, 243, 255, 0.5); font_size = 13; font_family = JetBrainsMono Nerd Font; position = 600, 0; halign = center; valign = center }

# ══════════════════════════════════════════════════════════════════════════════
#  WIDGETS CENTRALES
# ══════════════════════════════════════════════════════════════════════════════
label {
    monitor =
    text = cmd[update:1000] date +'%H:%M:%S'
    color = rgba(0, 243, 255, 1.0)
    font_size = 94
    font_family = DSEG7 Classic
    shadow_passes = 2
    position = 0, 150
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:3600000] echo "$USER@$(hostname)"
    color = rgba(189, 147, 249, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}
input-field {
    monitor =
    size = 350, 50
    outline_thickness = 2
    outer_color = rgba(122, 162, 247, 0.8)
    inner_color = rgba(3, 8, 18, 0.95)
    font_color = rgba(187, 154, 247, 1.0)
    placeholder_text = <span foreground="##00f3ff">INITIALIZING_AUTH_SESSION...</span>
    position = 0, -100
    halign = center
    valign = center
}

# Escape apaga pantalla cuando está bloqueado
bind = ESCAPE, exec, hyprctl dispatch dpms off
