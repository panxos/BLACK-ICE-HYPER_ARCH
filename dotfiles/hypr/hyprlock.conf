# Scanning animation — alterna entre strings cada 500ms
label {
    monitor =
    text = cmd[update:500] bash -c 'strings=("░░ SCANNING BIOMETRICS ░░" "▓▓ VERIFYING IDENTITY ▓▓" "██ CHECKING CLEARANCE ██" "░░ ANALYZING PATTERN ░░▓" "▒▒ CROSS-REFERENCING ▒▒░"); echo "${strings[$((RANDOM % 5))]}"'
    color = rgba(0, 243, 255, 0.35)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# Ícono usuario
label {
    monitor =
    text =
    color = rgba(0, 243, 255, 0.9)
    font_size = 52
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

# Usuario@host
label {
    monitor =
    text = cmd[update:3600000] echo "$USER@$(hostname)"
    color = rgba(189, 147, 249, 0.85)
    font_size = 17
    font_family = JetBrainsMono Nerd Font
    position = 0, -133
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 400, 58
    rounding = 4
    outline_thickness = 2

    dots_size = 0.38
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 243, 255, 0.8)
    inner_color = rgba(0, 8, 15, 0.97)
    font_color = rgba(0, 243, 255, 1.0)

    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text = <span foreground="#336677">CREDENTIAL_HASH_</span>

    check_color = rgba(80, 250, 123, 0.9)
    fail_color = rgba(255, 85, 85, 0.9)
    fail_text = <span foreground="#ff5555">⛔  ACCESS DENIED — WRONG CREDENTIAL</span>
    fail_transition = 300

    capslock_color = rgba(255, 184, 108, 1.0)
    numlock_color = -1
    bothlock_color = -1

    swap_font_color = false
    hide_input = false

    position = 0, -200
    halign = center
    valign = center
}

# Hint bajo el campo
label {
    monitor =
    text = cmd[update:700] bash -c 'hints=("[ ENTER CREDENTIALS TO AUTHENTICATE ]" "[ SYSTEM ACCESS REQUIRES AUTHORIZATION ]" "[ UNAUTHORIZED ACCESS IS PROHIBITED ]" "[ ALL ACTIONS ARE MONITORED AND LOGGED ]"); echo "${hints[$((RANDOM % 4))]}"'
    color = rgba(0, 243, 255, 0.3)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -250
    halign = center
    valign = center
}

# CapsLock warning
label {
    monitor =
    text = cmd[update:1000] bash -c 'cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | grep -q "^1$" && echo "⚠  CAPS LOCK ACTIVE — INPUT AFFECTED" || echo ""'
    color = rgba(255, 184, 108, 1.0)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -278
    halign = center
    valign = center
}

# Batería
label {
    monitor =
    text = cmd[update:30000] bash -c 'b=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); s=$(cat /sys/class/power_supply/BAT*/status 2>/dev/null | head -1); [ -n "$b" ] && echo "  PWR: $b% [$s]" || echo ""'
    color = rgba(0, 243, 255, 0.5)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -305
    halign = center
    valign = center
}

