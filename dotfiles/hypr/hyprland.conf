# BLACK-ICE ARCH - Hyprland Configuration (Soporteinfo-Cyber Edition)
# Compatible: Hyprland 0.54+

# --- Monitor ---
source = ~/.config/hypr/monitors.conf
monitor=,preferred,auto,auto

# --- VM Performance Override (auto-detecta KVM/QEMU/VirtualBox) ---
source = ~/.config/hypr/vm-performance.conf

# --- Variables Principales ---
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = env GTK_THEME=Adwaita:dark wofi --show drun --allow-images

# --- Environment ---
env = XCURSOR_SIZE,24
env = BROWSER,brave
env = XDG_CURRENT_DESKTOP,Hyprland
env = DE,Hyprland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
# Intel GPU acceleration para Electron apps (Brave, Vesktop, etc.)
env = LIBVA_DRIVER_NAME,iHD
env = VDPAU_DRIVER,va_gl
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = GTK_USE_PORTAL,1

# --- Autostart ---
# Sincronización inicial del entorno (Mantenemos una aquí para seguridad inmediata)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE

exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = ~/.config/hypr/scripts/startup.sh
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = sleep 2 && nm-applet --indicator
exec-once = sleep 2 && blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# swaync ya está en startup.sh
exec-once = swayosd-server
exec-once = swayosd-libinput-backend
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/auto_monitors.sh
exec-once = systemctl --user start tlp-stat.service || tlp start

# --- Appearance ---
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Sweet-Dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'candy-icons'
exec-once = gsettings set org.gnome.desktop.interface font-name 'Roboto Medium 10'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# --- Input ---
input {
    kb_layout = es
    follow_mouse = 1
    touchpad {
        natural_scroll = no
        disable_while_typing = true
        clickfinger_behavior = true
        tap-to-click = true
        tap-and-drag = true
        drag_lock = false
        scroll_factor = 0.8
        middle_button_emulation = false
    }
    sensitivity = 0
}

# --- General ---
general {
    gaps_in = 3
    gaps_out = 3
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 15

    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled    = true
        size       = 4
        passes     = 2
        noise      = 0.0117
        contrast   = 0.9
        brightness = 0.8
        vibrancy   = 0.2
    }

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }
}

# --- Animations ---
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,     1, 7, myBezier
    animation = windowsOut,  1, 7, default, popin 80%
    animation = border,      1, 10, default
    animation = borderangle, 1, 8,  linear,   loop
    animation = fade,        1, 7, default
    animation = workspaces,  1, 6, default
}

# --- Layouts ---
dwindle {
    preserve_split = yes
}













# --- Layer Rules ---
layerrule {
    name = swaync-blur
    match:namespace = ^(swaync)$
    blur = true
    ignore_alpha = 0.5
}

# --- Keybindings Sistema ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, H, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, Space, fullscreen, 1
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, P, pseudo,
bind = $mainMod ALT, W, exec, waypaper --folder ~/Pictures/wallpapers --backend awww
bind = $mainMod ALT, T, exec, ~/.config/bin/theme_visual
bind = $mainMod SHIFT, N, exec, ~/.config/bin/music_widget
bind = $mainMod ALT, R, exec, ~/.config/bin/wofi_style_selector
bind = $mainMod SHIFT, R, exec, ~/bin/rofi_theme_selector

# --- Keybindings Aplicaciones ---
bind = $mainMod SHIFT, B, exec, brave
bind = $mainMod SHIFT, F, exec, firefox
bind = $mainMod SHIFT, D, exec, dolphin
bind = $mainMod, E, exec, kate
bind = $mainMod SHIFT, T, exec, kate
bind = $mainMod SHIFT, O, exec, obsidian
bind = $mainMod SHIFT, E, exec, betterbird
bind = $mainMod SHIFT, C, exec, caido
bind = $mainMod SHIFT, K, exec, keepassxc
bind = $mainMod SHIFT, P, exec, ~/.config/bin/power_profile_menu.sh
bind = $mainMod SHIFT, M, exec, ~/.config/bin/music_player
bind = $mainMod, I,         exec, env GDK_BACKEND=wayland ~/.config/bin/cheatsheet
bind = $mainMod, Tab,     exec, ~/.config/bin/app_switcher
bind = $mainMod SHIFT, X, exec, ~/.config/bin/pass_menu
bind = $mainMod CTRL, Return, exec, ~/.config/bin/terminal_manager

# --- Screenshot Keys ---
bind = , Print,          exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print,     exec, grim - | wl-copy && notify-send "Screenshot" "Copiado al portapapeles" --urgency=low
bind = $mainMod, Print,  exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Guardado en ~/Pictures/Screenshots" --urgency=low
bind = CTRL, Print,      exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Guardado en ~/Pictures/Screenshots" --urgency=low

# --- Media & Fn Keys ---
bind = , F10, exec, playerctl play-pause
bind = , F11, exec, playerctl stop
bind = , F12, exec, brave

# --- Multimedia Keys (SwayOSD primario + fallbacks) ---
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise  || pamixer -i 5
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower  || pamixer -d 5
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle || pamixer -t
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_SOURCE@ toggle && swayosd-client --input-volume mute-toggle; true
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise     || brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower     || brightnessctl set 10%-

# --- Media Player ---
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioStop,  exec, playerctl stop
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# --- WiFi Toggle ---
bindl = , XF86WLAN,   exec, ~/.config/bin/wifi_toggle
bindl = , XF86RFKill, exec, ~/.config/bin/wifi_toggle
bind  = $mainMod ALT, F, exec, ~/.config/bin/wifi_toggle

# Notificación inicial de batería (Manejado en startup.sh)
# exec-once = ~/.config/bin/battery_notify.sh
# Generar previews de temas en primer boot (solo si no existen)
exec-once = bash -c 'sleep 8 && [ ! -f ~/.config/waybar/themes/Horus-Cyber/preview.png ] && ~/.config/bin/gen_theme_previews'

# --- Display Control ---
bind = , XF86Display, exec, nwg-displays

# --- Navigation ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Misc ---
misc {
    focus_on_activate = true
    disable_hyprland_logo  = true
    force_default_wallpaper = 0
}


# --- Layer Rules ---
layerrule {
    name = wofi-blur
    match:namespace = ^(wofi)$
    blur = true
    ignore_alpha = 0.5
}

# ── Mensajería — workspace 5 ──────────────────────────────────────────────────
windowrule {
    name = telegram-ws5
    match:class = ^(org\.telegram\.desktop)$
    workspace = 5 silent
}
windowrule {
    name = zapzap-ws5
    match:class = ^(com\.rtosta\.zapzap)$
    workspace = 5 silent
}
windowrule {
    name = vesktop-ws5
    match:class = ^(vesktop)$
    workspace = 5 silent
}

# ── MEGAsync — fix login window 1x1/hidden en XWayland ───────────────────────
windowrule {
    name = megasync-fix
    match:class = ^(MEGAsync)$
    float = 1
    center = 1
    size = 800 560
    suppress_event = fullscreen
    min_size = 400 500
    stay_focused = 1
}

exec-once = bash -c 'sleep 8 && Telegram -startintray'
exec-once = bash -c 'sleep 10 && nice -n 10 zapzap --hideStart'
