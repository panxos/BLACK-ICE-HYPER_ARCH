# BLACK-ICE - Kitty Configuration
# Font Configuration
# --- Fuentes P4nx0z ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
# ----------------------
font_size        11.0

# Window Layout
window_padding_width 15
background #1e1e2e
background_opacity 0.92
confirm_os_window_close 0

# Performance
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# Tab Bar - Powerline Style
tab_bar_style       powerline
tab_powerline_style slanted
active_tab_foreground   #000000
active_tab_background   #00ff99
inactive_tab_foreground #eeeeee
inactive_tab_background #222222

# Theme Configuration — auto-updated by theme_selector
# Do not edit manually; symlinked or overwritten by ~/.local/bin/theme_selector
include themes/current_theme.conf
shell zsh

# --- Environment Variables para CLI tools ---
# Asegura que gemini-cli, qwen-cli y otros tools OAuth abran el browser correcto
env BROWSER=xdg-open
env XDG_CURRENT_DESKTOP=Hyprland
env WAYLAND_DISPLAY=wayland-1
# Antigravity fix: forzar ruta Python
env PYTHONPATH=/usr/lib/python3/dist-packages

# Keybindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+f toggle_fullscreen
map ctrl+shift+u input_unicode_character

# --- Emojis P4nx0z Fix ---
# Forzar a Kitty a usar Noto Color Emoji para los rangos de símbolos y emojis
symbol_map U+1F600-U+1F64F,U+1F300-U+1F5FF,U+1F680-U+1F6FF,U+2600-U+26FF,U+2700-U+27BF,U+1F1E6-U+1F1FF,U+1F900-U+1F9FF,U+1FAD0-U+1FAFF,U+200D,U+200C Noto Color Emoji
