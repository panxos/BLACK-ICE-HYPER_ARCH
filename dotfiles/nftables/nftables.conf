#!/usr/sbin/nft -f
# =============================================================================
# BLACK-ICE ARCH — Firewall profesional
# Tabla: inet black-ice-filter (custom, no toca Docker/Tailscale/libvirt)
# INPUT: política DROP — solo tráfico explícitamente permitido
# FORWARD/OUTPUT: no gestionados aquí (Docker/libvirt manejan FORWARD)
# =============================================================================
#
# Arquitectura de tablas coexistentes:
#   ip filter          → Docker (DOCKER, DOCKER-USER, DOCKER-FORWARD)
#                      → Tailscale (ts-input, ts-forward)
#   ip libvirt_network → libvirt (guest_nat, guest_input, guest_output)
#   inet black-ice-filter → ESTE ARCHIVO (INPUT policy drop)
#
# destroy table: seguro incluso si la tabla no existe (nftables 1.0+)
# =============================================================================

destroy table inet black-ice-filter

table inet black-ice-filter {

    # ─── Conjunto de interfaces de confianza ─────────────────────────────────
    set TRUSTED_IFACES {
        type ifname
        flags interval
        elements = {
            "lo",           # loopback
            "docker0",      # Docker bridge default
            "virbr0",       # libvirt red default (192.168.122.0/24)
            "tailscale0"    # Tailscale VPN mesh
        }
    }

    # ─── INPUT: restricción de entrada ───────────────────────────────────────
    chain input {
        type filter hook input priority filter + 1; policy drop;

        # Interfaces de confianza (lo, docker0, virbr0, tailscale0)
        iifname @TRUSTED_IFACES accept comment "trusted interfaces"

        # Docker redes definidas por usuario (br-XXXX)
        iifname "br-*" accept comment "Docker user networks"

        # libvirt redes adicionales (virbr1, virbr2, ...)
        iifname "virbr*" accept comment "libvirt all bridges"

        # Tailscale WireGuard handshakes (inbound desde peers)
        udp dport 41641 accept comment "Tailscale WireGuard"

        # Conexiones establecidas / relacionadas
        ct state established,related accept comment "stateful established"
        ct state invalid drop           comment "drop paquetes inválidos"

        # ICMP completo: ping, traceroute, MTU discovery, time exceeded
        ip protocol icmp accept comment "ICMPv4"
        ip6 nexthdr icmpv6 accept comment "ICMPv6 (SLAAC, NDP, ping6)"

        # ── Servicios del host ────────────────────────────────────────────────
        tcp dport 22 accept comment "SSH"

        # DHCP: dnsmasq del host sirve IPs a VMs y containers
        udp dport 67 accept comment "DHCP server (VMs/containers)"

        # DNS local: usado por VMs en libvirt y algunos containers
        tcp dport 53 iifname "virbr*" accept comment "DNS para VMs"
        udp dport 53 iifname "virbr*" accept comment "DNS para VMs"

        # ── Servicios locales (descomenta según necesidad) ────────────────────
        # tcp dport 8000 accept comment "API local"
        # tcp dport 8080 accept comment "HTTP alternativo"
        # tcp dport 8443 accept comment "HTTPS alternativo"

        # ── Metasploit / Pentesting (handlers temporales) ────────────────────
        # Usar: sudo nft add rule inet black-ice-filter input tcp dport XXXX accept
        # O alias: fw-open PUERTO [tcp|udp]

        # ── Drop con log (rate limited para no saturar journal) ───────────────
        limit rate 5/minute burst 10 packets \
            log prefix "[black-ice-fw-drop] " flags all comment "log intentos bloqueados"
    }

    # OUTPUT sin restricciones: herramientas de pentesting necesitan salida libre
    chain output {
        type filter hook output priority filter; policy accept;
    }

    # FORWARD no se gestiona aquí:
    #   Docker   → ip filter FORWARD (policy drop + reglas DOCKER-FORWARD)
    #   libvirt  → ip libvirt_network forward (policy accept + guest_*)
    #   Tailscale → ip filter FORWARD (ts-forward)
}
